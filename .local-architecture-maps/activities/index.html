<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2330;
    --panel-2: #232f3e;
    --border: #2d3a4d;
    --text: #e8eef5;
    --text-dim: #8a9bb0;
    --accent: #4fc3f7;
    --danger: #ef5350;
    --warn: #ffb74d;
    --ok: #66bb6a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: grid;
    grid-template-columns: 280px 1fr 340px;
    grid-template-rows: 48px 1fr;
    grid-template-areas:
      "head head head"
      "left graph right";
    overflow: hidden;
  }
  header {
    grid-area: head;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header .module-tag {
    background: var(--accent);
    color: #001722;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }
  header .stats {
    color: var(--text-dim);
    font-size: 12px;
    margin-left: auto;
  }
  header .search {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    width: 220px;
    outline: none;
  }
  header .search:focus { border-color: var(--accent); }

  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  aside.right {
    grid-area: right;
    border-right: none;
    border-left: 1px solid var(--border);
  }
  aside.left { grid-area: left; }

  .filter-group {
    margin-bottom: 18px;
  }
  .filter-group h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
  }
  .filter-row:hover { background: var(--panel-2); }
  .filter-row input { margin: 0; cursor: pointer; }
  .swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .filter-row .count {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 11px;
  }
  .filter-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .filter-actions button {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 6px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
  }
  .filter-actions button:hover { color: var(--text); border-color: var(--accent); }

  #cy {
    grid-area: graph;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, #1a2330 1px, transparent 0);
    background-size: 24px 24px;
  }

  .detail-empty {
    color: var(--text-dim);
    text-align: center;
    padding: 60px 12px;
    font-size: 12px;
  }
  .detail h3 {
    margin: 0 0 4px;
    font-size: 15px;
    word-wrap: break-word;
  }
  .detail .type-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #001722;
  }
  .detail dl {
    margin: 16px 0 0;
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 12px;
    font-size: 12px;
  }
  .detail dt {
    color: var(--text-dim);
    font-weight: 500;
  }
  .detail dd {
    margin: 0;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .detail dd a {
    color: var(--accent);
    text-decoration: none;
  }
  .detail dd a:hover { text-decoration: underline; }
  .detail .desc {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.5;
  }
  .polish-list {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .polish-list h4 {
    margin: 0 0 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }
  .polish-item {
    background: var(--panel-2);
    border-left: 3px solid var(--warn);
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 0 3px 3px 0;
    font-size: 12px;
  }
  .polish-item.severity-high { border-left-color: var(--danger); }
  .polish-item.severity-low { border-left-color: var(--ok); }
  .polish-item strong { display: block; margin-bottom: 2px; }
  .polish-item span { color: var(--text-dim); font-size: 11px; }

  .edges-list {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .edges-list h4 {
    margin: 0 0 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }
  .edge-item {
    padding: 4px 0;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-dim);
  }
  .edge-item:hover { color: var(--text); }
  .edge-item .verb {
    color: var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-right: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>TalentTrack architecture map</h1>
  <span class="module-tag">activities</span>
  <input class="search" id="search" placeholder="Search nodes…" />
  <span class="stats" id="stats">…</span>
</header>

<aside class="left">
  <div class="filter-group">
    <h2>Node types</h2>
    <div class="filter-actions">
      <button data-action="select-all">All</button>
      <button data-action="select-none">None</button>
    </div>
    <div id="type-filters"></div>
  </div>

  <div class="filter-group">
    <h2>Polish overlays (highlight)</h2>
    <div class="filter-actions">
      <button data-action="overlay-clear">Clear</button>
    </div>
    <div id="overlay-filters"></div>
  </div>

  <div class="filter-group">
    <h2>Layout</h2>
    <div class="filter-actions">
      <button data-action="layout-fcose">Force-directed</button>
      <button data-action="layout-grid">Grid</button>
    </div>
    <div class="filter-actions">
      <button data-action="fit">Fit view</button>
    </div>
  </div>
</aside>

<div id="cy"></div>

<aside class="right">
  <div id="detail">
    <div class="detail-empty">Click a node for details.<br><br>Drag to pan, scroll to zoom.<br>Shift+drag to box-select.</div>
  </div>
</aside>

/* =====================================================================
   VIEWER
   ===================================================================== */

const elements = [
  ...MAP_DATA.nodes.map(n => ({
    data: {
      ...n,
      _color: TYPE_DEFS[n.type]?.color || '#888',
      _shape: TYPE_DEFS[n.type]?.shape || 'ellipse',
      _polishCount: (n.polish || []).length,
    },
  })),
  ...MAP_DATA.edges.map((e, i) => ({
    data: { id: `e_${i}`, source: e.source, target: e.target, label: e.verb },
  })),
];

cytoscape.use(cytoscapeFcose);

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements,
  style: [
    {
      selector: 'node',
      style: {
        'background-color': 'data(_color)',
        'shape': 'data(_shape)',
        'label': 'data(label)',
        'color': '#e8eef5',
        'font-size': '10px',
        'font-weight': 500,
        'text-valign': 'bottom',
        'text-margin-y': 6,
        'text-wrap': 'wrap',
        'text-max-width': '120px',
        'text-outline-color': '#0f1419',
        'text-outline-width': 2,
        'width': 'mapData(_polishCount, 0, 3, 28, 44)',
        'height': 'mapData(_polishCount, 0, 3, 28, 44)',
        'border-width': 0,
        'transition-property': 'background-color, border-color, border-width, opacity',
        'transition-duration': '0.15s',
      },
    },
    {
      selector: 'node[_polishCount > 0]',
      style: {
        'border-width': 2,
        'border-color': '#ef5350',
        'border-style': 'solid',
      },
    },
    {
      selector: 'node:selected',
      style: {
        'border-width': 4,
        'border-color': '#4fc3f7',
      },
    },
    {
      selector: 'node.dimmed',
      style: { 'opacity': 0.12 },
    },
    {
      selector: 'node.highlight-overlay',
      style: {
        'border-width': 4,
        'border-color': '#ffd54f',
        'border-style': 'double',
      },
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5,
        'line-color': '#3a4a60',
        'target-arrow-color': '#3a4a60',
        'target-arrow-shape': 'triangle',
        'arrow-scale': 0.9,
        'curve-style': 'bezier',
        'opacity': 0.55,
        'label': '',
        'font-size': '9px',
        'color': '#8a9bb0',
        'text-rotation': 'autorotate',
        'text-background-color': '#0f1419',
        'text-background-opacity': 0.9,
        'text-background-padding': 2,
      },
    },
    {
      selector: 'edge.touched',
      style: {
        'line-color': '#4fc3f7',
        'target-arrow-color': '#4fc3f7',
        'opacity': 1,
        'width': 2,
        'label': 'data(label)',
        'z-index': 100,
      },
    },
    {
      selector: 'edge.dimmed',
      style: { 'opacity': 0.05 },
    },
  ],
  wheelSensitivity: 0.2,
  minZoom: 0.2,
  maxZoom: 3,
});

runFcose();

function runFcose() {
  cy.layout({
    name: 'fcose',
    quality: 'proof',
    randomize: true,
    animate: false,
    nodeRepulsion: 8000,
    idealEdgeLength: 100,
    edgeElasticity: 0.45,
    nestingFactor: 0.1,
    gravity: 0.25,
    padding: 30,
  }).run();
}

function runGrid() {
  // Group nodes by type, lay out in columns
  const types = Object.keys(TYPE_DEFS);
  const byType = {};
  cy.nodes().forEach(n => {
    (byType[n.data('type')] = byType[n.data('type')] || []).push(n);
  });
  const colWidth = 180;
  const rowHeight = 80;
  types.forEach((t, ti) => {
    const nodes = byType[t] || [];
    nodes.forEach((n, ni) => {
      n.position({ x: ti * colWidth + 60, y: ni * rowHeight + 40 });
    });
  });
  cy.fit(undefined, 30);
}

/* ---------- Filter panel: node types ---------- */

const typeFiltersEl = document.getElementById('type-filters');
const overlayFiltersEl = document.getElementById('overlay-filters');
const activeTypes = new Set(Object.keys(TYPE_DEFS));
const activeOverlays = new Set();

function renderTypeFilters() {
  const counts = {};
  cy.nodes().forEach(n => {
    counts[n.data('type')] = (counts[n.data('type')] || 0) + 1;
  });
  typeFiltersEl.innerHTML = Object.entries(TYPE_DEFS).map(([key, def]) => `
    <label class="filter-row" data-type="${key}">
      <input type="checkbox" ${activeTypes.has(key) ? 'checked' : ''} data-type="${key}">
      <span class="swatch" style="background:${def.color}"></span>
      <span>${def.label}</span>
      <span class="count">${counts[key] || 0}</span>
    </label>
  `).join('');
  typeFiltersEl.querySelectorAll('input[data-type]').forEach(cb => {
    cb.addEventListener('change', (e) => {
      const t = e.target.dataset.type;
      if (e.target.checked) activeTypes.add(t); else activeTypes.delete(t);
      applyTypeFilter();
    });
  });
}

function applyTypeFilter() {
  cy.batch(() => {
    cy.nodes().forEach(n => {
      const visible = activeTypes.has(n.data('type'));
      n.style('display', visible ? 'element' : 'none');
    });
  });
  updateStats();
}

function renderOverlayFilters() {
  const counts = {};
  cy.nodes().forEach(n => {
    (n.data('polish') || []).forEach(p => counts[p.key] = (counts[p.key] || 0) + 1);
  });
  overlayFiltersEl.innerHTML = Object.entries(OVERLAY_DEFS).map(([key, def]) => `
    <label class="filter-row" title="${def.desc.replace(/"/g,'&quot;')}">
      <input type="checkbox" data-overlay="${key}" ${activeOverlays.has(key) ? 'checked' : ''}>
      <span class="swatch" style="background:${def.color}"></span>
      <span>${def.label}</span>
      <span class="count">${counts[key] || 0}</span>
    </label>
  `).join('');
  overlayFiltersEl.querySelectorAll('input[data-overlay]').forEach(cb => {
    cb.addEventListener('change', (e) => {
      const k = e.target.dataset.overlay;
      if (e.target.checked) activeOverlays.add(k); else activeOverlays.delete(k);
      applyOverlayHighlight();
    });
  });
}

function applyOverlayHighlight() {
  cy.batch(() => {
    cy.nodes().removeClass('highlight-overlay');
    if (activeOverlays.size === 0) return;
    cy.nodes().forEach(n => {
      const polish = n.data('polish') || [];
      const match = polish.some(p => activeOverlays.has(p.key));
      if (match) n.addClass('highlight-overlay');
    });
  });
}

/* ---------- Filter actions ---------- */

document.querySelectorAll('button[data-action]').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = btn.dataset.action;
    if (a === 'select-all') {
      Object.keys(TYPE_DEFS).forEach(k => activeTypes.add(k));
      renderTypeFilters();
      applyTypeFilter();
    } else if (a === 'select-none') {
      activeTypes.clear();
      renderTypeFilters();
      applyTypeFilter();
    } else if (a === 'overlay-clear') {
      activeOverlays.clear();
      renderOverlayFilters();
      applyOverlayHighlight();
    } else if (a === 'layout-fcose') {
      runFcose();
    } else if (a === 'layout-grid') {
      runGrid();
    } else if (a === 'fit') {
      cy.fit(undefined, 30);
    }
  });
});

/* ---------- Search ---------- */

const searchEl = document.getElementById('search');
searchEl.addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  cy.batch(() => {
    cy.nodes().removeClass('dimmed');
    cy.edges().removeClass('dimmed');
    if (!q) return;
    cy.nodes().forEach(n => {
      const hay = (n.data('label') + ' ' + (n.data('desc') || '') + ' ' + (n.data('file') || '')).toLowerCase();
      if (!hay.includes(q)) n.addClass('dimmed');
    });
    cy.edges().addClass('dimmed');
  });
});

/* ---------- Selection / detail panel ---------- */

const detailEl = document.getElementById('detail');

cy.on('tap', 'node', (e) => {
  showDetail(e.target);
  highlightNeighborhood(e.target);
});

cy.on('tap', (e) => {
  if (e.target === cy) {
    detailEl.innerHTML = '<div class="detail-empty">Click a node for details.</div>';
    cy.elements().removeClass('touched');
  }
});

function highlightNeighborhood(node) {
  cy.batch(() => {
    cy.edges().removeClass('touched');
    node.connectedEdges().addClass('touched');
  });
}

function showDetail(node) {
  const d = node.data();
  const typeDef = TYPE_DEFS[d.type];
  const incoming = node.incomers('edge').map(e => ({
    other: e.source(),
    verb: e.data('label'),
    direction: '←',
  }));
  const outgoing = node.outgoers('edge').map(e => ({
    other: e.target(),
    verb: e.data('label'),
    direction: '→',
  }));
  const edges = [...outgoing, ...incoming];

  const polishHtml = (d.polish && d.polish.length) ? `
    <div class="polish-list">
      <h4>Polish flags · ${d.polish.length}</h4>
      ${d.polish.map(p => `
        <div class="polish-item severity-${p.severity || 'medium'}">
          <strong>${OVERLAY_DEFS[p.key]?.label || p.key}</strong>
          <span>${p.note || ''}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  const edgesHtml = edges.length ? `
    <div class="edges-list">
      <h4>Connections · ${edges.length}</h4>
      ${edges.map(({ other, verb, direction }) => `
        <div class="edge-item" data-other="${other.id()}">
          <span class="verb">${verb}</span>
          ${direction} ${other.data('label')}
        </div>
      `).join('')}
    </div>
  ` : '';

  const fileUrl = d.file
    ? `vscode://file/${(window.REPO_ROOT || 'c:/Users/caspe/Documents/GitHub/talenttrack')}/${d.file}${d.line ? ':' + d.line : ''}`
    : null;

  detailEl.innerHTML = `
    <div class="detail">
      <span class="type-pill" style="background:${typeDef.color}">${typeDef.label}</span>
      <h3>${d.label}</h3>
      ${d.desc ? `<p class="desc">${d.desc}</p>` : ''}
      <dl>
        <dt>ID</dt><dd>${d.id}</dd>
        ${d.file ? `<dt>File</dt><dd>${fileUrl ? `<a href="${fileUrl}">${d.file}${d.line ? ':' + d.line : ''}</a>` : `${d.file}${d.line ? ':' + d.line : ''}`}</dd>` : ''}
      </dl>
      ${polishHtml}
      ${edgesHtml}
    </div>
  `;

  detailEl.querySelectorAll('.edge-item[data-other]').forEach(el => {
    el.addEventListener('click', () => {
      const other = cy.getElementById(el.dataset.other);
      cy.center(other);
      other.select();
      showDetail(other);
      highlightNeighborhood(other);
    });
  });
}

/* ---------- Stats ---------- */

function updateStats() {
  const total = cy.nodes().length;
  const visible = cy.nodes().filter(n => n.style('display') !== 'none').length;
  const polish = cy.nodes().reduce((sum, n) => sum + (n.data('polish') || []).length, 0);
  document.getElementById('stats').textContent =
    `${visible}/${total} nodes · ${cy.edges().length} edges · ${polish} polish flags · captured ${MAP_DATA.meta.captured} (${MAP_DATA.meta.repo_version})`;
}

renderTypeFilters();
renderOverlayFilters();
updateStats();
</script>
