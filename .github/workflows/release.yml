name: TalentTrack Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    name: PHP Syntax Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: PHP syntax check
        run: |
          find src -name "*.php" -print0 | xargs -0 -n1 -P4 php -l

  phpstan:
    name: PHPStan Static Analysis (level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress || true

  admin-center-self-check:
    name: Admin Center payload self-check (#0065)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Run shape + privacy + sign-round-trip self-check
        run: php bin/admin-center-self-check.php

  legacy-sessions-gate:
    name: No legacy 'sessions' strings (#0035)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify no Sessions terminology snuck back in
        run: |
          set -e
          # Forbidden tokens — these should not exist anywhere outside
          # historical migrations + the Activator's initial schema +
          # docblock notes that reference the rename.
          # The pattern intentionally excludes:
          #   - database/migrations/0001_*.php through 0026_*.php (frozen history)
          #   - src/Core/Activator.php (initial-schema CREATE TABLE statements)
          #   - the rename migration itself
          #   - the spec
          #   - .po file (translation msgid history)
          #   - explicit docblock comments mentioning the rename
          forbidden=(
            'tt_sessions'
            '\bsession_id\b'
            'FrontendMySessionsView'
            'FrontendSessionsManageView'
            'tt_view_sessions'
            'tt_edit_sessions'
            'tt-sessions'
            'tt_session_completed'
            'post_match_evaluation'
            'PostMatchEvaluationTemplate'
            'PostMatchEvaluationForm'
            'tt_save_session'
            'tt_delete_session'
            'SessionsRestController'
            'class SessionsModule'
            'class SessionsPage'
            'SessionGenerator'
            '\bmatch_result\b'
            '\bcompetition_type\b'
            'TT\\Modules\\Sessions'
            'my_sessions'
            # #0037 — REST URL segments. The original gate caught caps
            # and slugs but missed REST paths, which is how the guest-
            # attendance fatal slipped through (controller registered
            # /sessions while the JS client POSTed to /activities).
            "register_rest_route\\([^,]*,[ ]*'/sessions"
            "'sessions/'"
            "'sessions/\\{id\\}'"
          )
          excludes=(
            -e 'database/migrations/0001'
            -e 'database/migrations/0002'
            -e 'database/migrations/0004'
            -e 'database/migrations/0010'
            -e 'database/migrations/0013'
            -e 'database/migrations/0015'
            -e 'database/migrations/0020'
            -e 'database/migrations/0021_workflow_engine'
            -e 'database/migrations/0022_workflow_default_triggers'
            -e 'database/migrations/0026'
            -e 'database/migrations/0027_rename_sessions_to_activities'
            -e 'database/migrations/0028_authorization_user_walk'
            -e 'src/Core/Activator.php'
            -e 'specs/0035'
            -e 'languages/talenttrack-nl_NL.po'
            -e 'languages/talenttrack-nl_NL.mo'
            -e 'CHANGES.md'
            -e 'SEQUENCE.md'
            -e 'src/Modules/Activities/ActivitiesModule.php'
            -e 'src/Modules/Activities/Admin/ActivitiesPage.php'
            -e '.github/workflows/release.yml'
          )
          fail=0
          for tok in "${forbidden[@]}"; do
            hits=$(grep -rnE "$tok" src/ database/ docs/ assets/js/ config/ 2>/dev/null | grep -v "${excludes[@]}" || true)
            if [ -n "$hits" ]; then
              echo "::error::Legacy token '$tok' reappeared in:"
              echo "$hits"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then
            echo ""
            echo "Legacy 'sessions' tokens cannot reappear after #0035 (no-legacy rule)."
            echo "Use the activities vocabulary: tt_activities, activity_id, FrontendMyActivitiesView, etc."
            exit 1
          fi
          echo "No legacy sessions tokens found — clean."

          # i18n-text gate (added by i18n audit, May 2026) — catches
          # user-visible "session"/"Session" vocabulary inside quoted strings
          # in PHP source. The rename added nl_NL translations only for
          # "activity"/"activities", so wrapped "session" strings ship raw
          # English to Dutch users.
          # Allow-list: legitimate non-training-session uses (browser
          # sessions, possession as a tactical concept, historical migration
          # banner, demo-data dual labels, docblock examples).
          echo ""
          echo "Auditing PHP quoted strings for user-visible 'session' vocabulary…"
          # The pattern is tier-1/tier-2 user-visible "session" vocabulary
          # in PHP strings. Allow-list categories:
          #   1. Legitimate non-training-session uses (browser sessions,
          #      possession as a tactical concept).
          #   2. Internal log/array/section keys, capability codes, REST
          #      route slugs, internal sheet labels (Tier 3 — out of scope).
          #   3. The Excel template builder + sheet schemas user-facing
          #      strings (Bundle 6 of the i18n audit, ships separately).
          #   4. Specific historical references (migrated-from-sessions
          #      banner, dual-label demo-data hint).
          i18n_pattern="['\"][^'\"]*\\b[Ss]ession[s]?\\b[^'\"]*['\"]"
          # File-level excludes for Tier-3 / Bundle-6 deferred:
          allow_files='src/Modules/DemoData/|src/Shared/Admin/BackNavigator\.php|src/Modules/Reports/ReportConfig\.php|src/Modules/Reports/PlayerReportRenderer\.php|src/Shared/Frontend/FrontendActivitiesManageView\.php|src/Infrastructure/REST/ActivitiesRestController\.php|src/Infrastructure/PlayerStatus/PlayerAttendanceCalculator\.php|src/Modules/Authorization/Impersonation/'
          # Phrase-level excludes:
          allow_phrases="earlier session|active sessions|browser session|possession|Possession|migrated from sessions|Activities \(Sessions\)|Sessions referencing|FrontendListTable\.php|sprintf|^\s*\*|impersonation session|My sessions\" tile destination|tt-report-sessions|sessions\.(view|manage)|session\.[a-z_]+|'sessions'\s+=>|, +'sessions' \],?\$"
          i18n_hits=$(grep -rnE "$i18n_pattern" --include='*.php' src/ 2>/dev/null \
            | grep -vE "$allow_files" \
            | grep -vE "$allow_phrases" \
            || true)
          if [ -n "$i18n_hits" ]; then
            echo "::error::User-visible 'session' vocabulary in PHP strings:"
            echo "$i18n_hits"
            echo ""
            echo "These ship untranslated on Dutch installs (the .po only has 'activity'/'activities' translations)."
            echo "Either rename the user-visible string to 'activity'/'activities' or extend the allow-list above"
            echo "if it's a legitimate non-training-session use of the word."
            exit 1
          fi
          echo "No untranslatable 'session' strings — clean."

  mobile-pattern-lint:
    name: Mobile pattern conventions (#0084)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify mobile-pattern-library conventions
        run: |
          set -e
          # #0084 Child 2 — guardrails for surfaces that ship the
          # mobile pattern library:
          #   1. No `<table>` markers in templates known to render
          #      on `native` routes. The list will grow with #0084
          #      Child 3's full classification rollout; for now we
          #      gate the new-evaluation wizard (the reference
          #      implementation) only.
          #   2. No `position: fixed` rules in CSS files outside
          #      mobile-patterns.css and a small allow-list of legacy
          #      stylesheets that already use it for their own valid
          #      reasons (sticky table headers, modal overlays, etc.
          #      pre-#0084 patterns).
          fail=0

          # (1) <table> in native-route templates.
          native_paths=(
            'src/Modules/Wizards/Evaluation/RateActorsStep.php'
            'src/Modules/Wizards/Evaluation/PlayerPickerStep.php'
            'src/Modules/Wizards/Evaluation/ActivityPickerStep.php'
          )
          for path in "${native_paths[@]}"; do
            [ -f "$path" ] || continue
            hits=$(grep -nE '<table' "$path" || true)
            if [ -n "$hits" ]; then
              echo "::error::Native-route template contains <table>: $path"
              echo "$hits"
              echo ""
              echo "Native surfaces use tt-mobile-list-item instead. See docs/mobile-patterns.md §4."
              fail=1
            fi
          done

          # (2) position: fixed outside the allow-list. Existing CSS
          # files that legitimately use position: fixed for sticky
          # headers, modals, overlays, etc. are exempt — the lint
          # only flags fresh violations in NEW CSS files.
          allowed_files=(
            'assets/css/mobile-patterns.css'
            'assets/css/admin.css'
            'assets/css/public.css'
            'assets/css/frontend-admin.css'
            'assets/css/frontend-mobile.css'
            'assets/css/frontend-activities-manage.css'
            # Pre-#0084 PDE overlays: dragging guides, alignment markers,
            # and the canvas drop indicator legitimately use position: fixed.
            'assets/css/persona-dashboard-editor.css'
          )
          violation_paths=$(find assets/css -name '*.css' -type f 2>/dev/null || true)
          for f in $violation_paths; do
            allowed=0
            for af in "${allowed_files[@]}"; do
              if [ "$f" = "$af" ]; then allowed=1; break; fi
            done
            if [ "$allowed" -eq 1 ]; then continue; fi
            hits=$(grep -nE 'position:\s*fixed' "$f" || true)
            if [ -n "$hits" ]; then
              echo "::error::position: fixed in non-allow-listed CSS: $f"
              echo "$hits"
              echo ""
              echo "Bottom CTAs go through tt-mobile-cta-bar. Other fixed-position uses need an entry in the allow-list above."
              fail=1
            fi
          done

          if [ $fail -eq 1 ]; then exit 1; fi
          echo "Mobile pattern-library conventions clean."

  docs-audience:
    name: Docs audience markers (#0029)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify every docs/*.md declares an audience
        run: |
          set -e
          missing=()
          # English + per-locale doc trees. New locale folders inherit the rule
          # automatically because the loop matches docs/*.md and docs/*/*.md.
          for f in docs/*.md docs/*/*.md; do
            [ -f "$f" ] || continue
            if ! head -5 "$f" | grep -qE '^<!--\s*audience\s*:\s*([a-z, ]+)\s*-->'; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing audience marker on:"
            printf '  %s\n' "${missing[@]}"
            echo ""
            echo "Add a marker to the top of each file:"
            echo "  <!-- audience: user -->"
            echo "  <!-- audience: admin -->"
            echo "  <!-- audience: dev -->"
            echo "  <!-- audience: user, admin -->"
            echo ""
            echo "See docs/contributing.md for the full rule."
            exit 1
          fi
          echo "All docs declare an audience marker."

  release:
    name: Build & Release ZIP
    needs: [lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
      - name: Install production dependencies
        run: |
          if [ -f composer.json ] && grep -q '"require"' composer.json && ! grep -q '"require": *{ *}' composer.json; then
            composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader
          fi
      - name: Regenerate .mo files from .po (always fresh in release ZIP)
        run: |
          for po in languages/*.po; do
            mo="${po%.po}.mo"
            echo "Compiling $po → $mo"
            msgfmt -o "$mo" "$po"
          done
      - name: Build plugin ZIP
        run: |
          mkdir -p /tmp/build
          # vendor/ is bundled (production deps only — phpstan + szepeviktor are dev-only).
          rsync -av \
            --exclude='.git' --exclude='.github' --exclude='.gitignore' \
            --exclude='tests' --exclude='phpstan*' \
            --exclude='vendor/bin' --exclude='vendor/phpstan' --exclude='vendor/szepeviktor' \
            --exclude='branding-plugin' \
            ./ /tmp/build/talenttrack/
          cd /tmp/build
          zip -r talenttrack.zip talenttrack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/talenttrack.zip
          generate_release_notes: true
