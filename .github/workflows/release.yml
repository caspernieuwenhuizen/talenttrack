name: TalentTrack Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    name: PHP Syntax Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: PHP syntax check
        run: |
          find src -name "*.php" -print0 | xargs -0 -n1 -P4 php -l
      # #1393 — MFA QR capacity + no-truncation regression gate. Pure
      # PHP (no WP bootstrap): asserts realistic otpauth URIs fit the
      # v7/v8 budgets, the renderer emits sane SVG across the v6-v10
      # production range, and over-capacity payloads are refused
      # instead of silently truncated.
      - name: MFA QR self-check
        run: php bin/qr-selfcheck.php

  phpstan:
    name: PHPStan Static Analysis (level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress || true

  admin-center-self-check:
    name: Admin Center payload self-check (#0065)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Run shape + privacy + sign-round-trip self-check
        run: php bin/admin-center-self-check.php

  legacy-sessions-gate:
    name: No legacy 'sessions' strings (#0035)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify no Sessions terminology snuck back in
        run: |
          set -e
          # Forbidden tokens — these should not exist anywhere outside
          # historical migrations + the Activator's initial schema +
          # docblock notes that reference the rename.
          # The pattern intentionally excludes:
          #   - database/migrations/ entirely (#1318 — append-only schema
          #     mutation files MUST name the column they're renaming;
          #     they cannot smuggle live runtime regressions)
          #   - src/Core/Activator.php (initial-schema CREATE TABLE statements)
          #   - the spec
          #   - .po file (translation msgid history)
          #   - explicit docblock comments mentioning the rename
          # v3.109.0 (#0086 Workstream B Child 2) released the legitimate
          # WP-login-session feature that owns the `MySessions*` /
          # `tt-sessions` / `my_sessions` / `tt_my_sessions_*` namespace.
          # Those names are NOT regressions of the OLD "training session"
          # entity — they manage WordPress login session tokens and are a
          # distinct concept. Tokens that still catch the OLD vocabulary
          # remain (`tt_sessions` table, `session_id` FK, the wp-admin /
          # REST class names from the renamed module, the workflow events,
          # etc.), so the gate's intent is preserved.
          forbidden=(
            'tt_sessions'
            '\bsession_id\b'
            'FrontendSessionsManageView'
            'tt_view_sessions'
            'tt_edit_sessions'
            'tt_session_completed'
            'post_match_evaluation'
            'PostMatchEvaluationTemplate'
            'PostMatchEvaluationForm'
            'tt_save_session'
            'tt_delete_session'
            'SessionsRestController'
            'class SessionsModule'
            'class SessionsPage'
            'SessionGenerator'
            '\bmatch_result\b'
            '\bcompetition_type\b'
            'TT\\Modules\\Sessions'
            # #0037 — REST URL segments. The original gate caught caps
            # and slugs but missed REST paths, which is how the guest-
            # attendance fatal slipped through (controller registered
            # /sessions while the JS client POSTed to /activities).
            "register_rest_route\\([^,]*,[ ]*'/sessions"
            "'sessions/'"
            "'sessions/\\{id\\}'"
          )
          excludes=(
            # #1318 — blanket-exclude the migrations directory. Migrations
            # are append-only schema-mutation files; their entire purpose
            # is to type the old name and rename it. They cannot smuggle
            # live runtime regressions. The per-migration allowlist
            # (0001, 0002, … 0028) was a ratchet — every rename-away
            # migration tripped the gate until an operator remembered to
            # add it. Migration 0146 (session_principles → activity_principles)
            # was the latent failure that surfaced this.
            -e 'database/migrations/'
            -e 'src/Core/Activator.php'
            -e 'specs/0035'
            -e 'languages/talenttrack-nl_NL.po'
            -e 'languages/talenttrack-nl_NL.mo'
            -e 'CHANGES.md'
            -e 'SEQUENCE.md'
            -e 'src/Modules/Activities/ActivitiesModule.php'
            -e 'src/Modules/Activities/Admin/ActivitiesPage.php'
            -e '.github/workflows/release.yml'
            # v4.2.0 — `competition_type` is now a legitimate user-
            # editable `tt_lookups` row type (Cup / League / Friendly /
            # …) registered in `FrontendConfigurationView`. The token's
            # original meaning under #0035 was the OLD competition_type
            # column on the renamed sessions table, long gone. The
            # lookup-type name shares the spelling but is a distinct
            # concept — exclude the only file that references it.
            -e 'src/Shared/Frontend/FrontendConfigurationView.php'
            # v4.12.0 (#987) — `LookupCanonicalSeeds` is the source-of-
            # truth map for canonical English values per lookup_type,
            # including the legitimate `competition_type` lookup type.
            # Same rationale as the FrontendConfigurationView exclusion
            # above.
            -e 'src/Modules/Configuration/LookupCanonicalSeeds.php'
            # v4.12.5 (#988 PR-set 6) — `CompetitionType` is the typed
            # constants class backing the legitimate `competition_type`
            # lookup. Same rationale as `LookupCanonicalSeeds`: the
            # underscore form names the lookup_type vocabulary, not the
            # renamed-away column on the sessions table.
            -e 'src/Domain/Vocabularies/Lookups/CompetitionType.php'
            # v4.21.x — `LookupTranslationSeeds` carries the localized
            # labels for canonical lookup values, including the legitimate
            # `competition_type` lookup type (Cup / League / Friendly /
            # …). Same rationale as `LookupCanonicalSeeds` /
            # `CompetitionType`: the underscore form names the lookup_type
            # vocabulary, not the renamed-away sessions column. Without
            # this the release build failed the no-legacy gate and no
            # release asset was published.
            -e 'src/Modules/Configuration/LookupTranslationSeeds.php'
          )
          fail=0
          for tok in "${forbidden[@]}"; do
            hits=$(grep -rnE "$tok" src/ database/ docs/ assets/js/ config/ 2>/dev/null | grep -v "${excludes[@]}" || true)
            if [ -n "$hits" ]; then
              echo "::error::Legacy token '$tok' reappeared in:"
              echo "$hits"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then
            echo ""
            echo "Legacy 'sessions' tokens cannot reappear after #0035 (no-legacy rule)."
            echo "Use the activities vocabulary: tt_activities, activity_id, FrontendMyActivitiesView, etc."
            exit 1
          fi
          echo "No legacy sessions tokens found — clean."

          # i18n-text gate (added by i18n audit, May 2026) — catches
          # user-visible "session"/"Session" vocabulary inside quoted strings
          # in PHP source. The rename added nl_NL translations only for
          # "activity"/"activities", so wrapped "session" strings ship raw
          # English to Dutch users.
          # Allow-list: legitimate non-training-session uses (browser
          # sessions, possession as a tactical concept, historical migration
          # banner, demo-data dual labels, docblock examples).
          echo ""
          echo "Auditing PHP quoted strings for user-visible 'session' vocabulary…"
          # The pattern is tier-1/tier-2 user-visible "session" vocabulary
          # in PHP strings. Allow-list categories:
          #   1. Legitimate non-training-session uses (browser sessions,
          #      possession as a tactical concept).
          #   2. Internal log/array/section keys, capability codes, REST
          #      route slugs, internal sheet labels (Tier 3 — out of scope).
          #   3. The Excel template builder + sheet schemas user-facing
          #      strings (Bundle 6 of the i18n audit, ships separately).
          #   4. Specific historical references (migrated-from-sessions
          #      banner, dual-label demo-data hint).
          i18n_pattern="['\"][^'\"]*\\b[Ss]ession[s]?\\b[^'\"]*['\"]"
          # File-level excludes for Tier-3 / Bundle-6 deferred:
          # v3.109.3 (#0086 Workstream B Child 2) — the my-sessions
          # surface + its admin-post handlers legitimately use the word
          # "session"/"sessions" in user-visible strings (these are
          # WordPress login sessions, a distinct concept from the OLD
          # training-session entity). All copy is translated in the .po.
          # v4.3.6 (#0095 / #911) — `src/Modules/Vct/` legitimately uses
          # "session" throughout as the spec-defined VCT-session entity
          # name (tt_vct_sessions table). Distinct from the renamed-away
          # tt_sessions entity. The i18n regex over-matches across PHP
          # quote boundaries (e.g. `$session['k']` adjacent to another
          # `$session['k2']` falsely matches as a session-string),
          # which makes per-line carve-outs impractical. Whole-folder
          # allow-list matches the Impersonation/ convention above.
          allow_files='src/Modules/DemoData/|src/Shared/Admin/BackNavigator\.php|src/Modules/Reports/ReportConfig\.php|src/Modules/Reports/PlayerReportRenderer\.php|src/Shared/Frontend/FrontendActivitiesManageView\.php|src/Infrastructure/REST/ActivitiesRestController\.php|src/Infrastructure/PlayerStatus/PlayerAttendanceCalculator\.php|src/Modules/Authorization/Impersonation/|src/Shared/Admin/MySessionsActionHandlers\.php|src/Shared/Frontend/FrontendMySessionsView\.php|src/Modules/Vct/'
          # Phrase-level excludes:
          # `'my-sessions'` (slug literal) and `My sessions` (user-menu
          # label) are part of v3.109.3's WP-login-session feature; the
          # FrontendMySessionsView file is whitelisted above, but the
          # shortcode dispatcher legitimately references the slug.
          # v3.110.158 — `session expired` allows the v3.110.157 nonce-
          # fail notice in `FrontendWizardView` (a WP-nonce / HTTP
          # session concern, not the training-session entity).
          # v4.3.1 (#0095) — `VCT session`/`VCT sessions` is the spec-
          # defined entity name for the new Voetbal Conditionele Training
          # module's planned-conditioning-training entity (tt_vct_sessions
          # table). Distinct from the renamed-away tt_sessions entity;
          # the prefix `VCT ` disambiguates in every user-visible string.
          # v4.21.x — `Avg session` is a usage-analytics session (a user's
          # time-on-task visit on the Application KPIs surface), the same
          # legitimate non-training-session sense as `browser session` /
          # `active sessions` above. Not the renamed-away training entity.
          # #1577 — `'icon' => 'sessions'` is an icon-asset slug (the
          # calendar glyph reused by the Spond integration tile, added in
          # #1532), not user-visible copy. The i18n regex over-matches the
          # bare slug literal. FrontendConfigurationView is already excluded
          # from the token grep above for `competition_type`; allow the icon
          # slug here too.
          allow_phrases="earlier session|active sessions|browser session|session expired|possession|Possession|migrated from sessions|Activities \(Sessions\)|Sessions referencing|FrontendListTable\.php|sprintf|^\s*\*|impersonation session|My sessions\" tile destination|tt-report-sessions|sessions\.(view|manage)|session\.[a-z_]+|'sessions'\s+=>|'session'\s+=>|, +'sessions' \],?\$|'my-sessions'|My sessions|VCT session|VCT sessions|'vct-session'|vct-sessions|Avg session|per session|'icon' *=> *'sessions'"
          i18n_hits=$(grep -rnE "$i18n_pattern" --include='*.php' src/ 2>/dev/null \
            | grep -vE "$allow_files" \
            | grep -vE "$allow_phrases" \
            || true)
          if [ -n "$i18n_hits" ]; then
            echo "::error::User-visible 'session' vocabulary in PHP strings:"
            echo "$i18n_hits"
            echo ""
            echo "These ship untranslated on Dutch installs (the .po only has 'activity'/'activities' translations)."
            echo "Either rename the user-visible string to 'activity'/'activities' or extend the allow-list above"
            echo "if it's a legitimate non-training-session use of the word."
            exit 1
          fi
          echo "No untranslatable 'session' strings — clean."

  docs-audience:
    name: Docs audience markers (#0029)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify every docs/*.md declares an audience
        run: |
          set -e
          missing=()
          # English + per-locale doc trees. New locale folders inherit the rule
          # automatically because the loop matches docs/*.md and docs/*/*.md.
          for f in docs/*.md docs/*/*.md; do
            [ -f "$f" ] || continue
            if ! head -5 "$f" | grep -qE '^<!--\s*audience\s*:\s*([a-z, ]+)\s*-->'; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing audience marker on:"
            printf '  %s\n' "${missing[@]}"
            echo ""
            echo "Add a marker to the top of each file:"
            echo "  <!-- audience: user -->"
            echo "  <!-- audience: admin -->"
            echo "  <!-- audience: dev -->"
            echo "  <!-- audience: user, admin -->"
            echo ""
            echo "See docs/contributing.md for the full rule."
            exit 1
          fi
          echo "All docs declare an audience marker."

  release:
    name: Build & Release ZIP
    needs: [lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
      - name: Install production dependencies
        run: |
          if [ -f composer.json ] && grep -q '"require"' composer.json && ! grep -q '"require": *{ *}' composer.json; then
            composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader
          fi
      - name: Regenerate .mo files from .po (always fresh in release ZIP)
        run: |
          for po in languages/*.po; do
            mo="${po%.po}.mo"
            echo "Compiling $po → $mo"
            msgfmt -o "$mo" "$po"
          done
      - name: Build plugin ZIP
        run: |
          mkdir -p /tmp/build
          # vendor/ is bundled (production deps only — phpstan + szepeviktor are dev-only).
          rsync -av \
            --exclude='.git' --exclude='.github' --exclude='.gitignore' \
            --exclude='tests' --exclude='phpstan*' \
            --exclude='vendor/bin' --exclude='vendor/phpstan' --exclude='vendor/szepeviktor' \
            --exclude='branding-plugin' \
            ./ /tmp/build/talenttrack/
          cd /tmp/build
          zip -r talenttrack.zip talenttrack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/talenttrack.zip
          generate_release_notes: true
