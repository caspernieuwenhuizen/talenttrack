name: Build & Release a specific tag

# Manual escape hatch for the case where `release.yml`'s tag-push trigger
# did not fire — most commonly when more than three tags are pushed in a
# single `git push`, which GitHub silently drops events for (see
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#push-events).
#
# Invoke: `gh workflow run release-tag.yml -f tag=v3.110.119`
#
# Mirrors the build + release steps in release.yml's `release` job, but
# checks out the tag passed as input rather than `github.ref` (so the
# job can run from a workflow file on `main` while building artifacts
# from an older tag whose workflow file did not have workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.110.119). Must already exist on the remote.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release ZIP for ${{ inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
      - name: Install production dependencies
        run: |
          if [ -f composer.json ] && grep -q '"require"' composer.json && ! grep -q '"require": *{ *}' composer.json; then
            composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader
          fi
      - name: Regenerate .mo files from .po (always fresh in release ZIP)
        run: |
          for po in languages/*.po; do
            mo="${po%.po}.mo"
            echo "Compiling $po → $mo"
            msgfmt -o "$mo" "$po"
          done
      - name: Build plugin ZIP
        run: |
          mkdir -p /tmp/build
          rsync -av \
            --exclude='.git' --exclude='.github' --exclude='.gitignore' \
            --exclude='tests' --exclude='phpstan*' \
            --exclude='vendor/bin' --exclude='vendor/phpstan' --exclude='vendor/szepeviktor' \
            --exclude='branding-plugin' \
            ./ /tmp/build/talenttrack/
          cd /tmp/build
          zip -r talenttrack.zip talenttrack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: /tmp/build/talenttrack.zip
          generate_release_notes: true
