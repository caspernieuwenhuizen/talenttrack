name: Translations

on:
  push:
    branches:
      - main
    paths:
      - 'languages/**.po'
  pull_request:
    branches:
      - main
    paths:
      - 'languages/**.po'

permissions:
  contents: write

jobs:
  validate:
    name: Validate .po syntax
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Verify each .po file compiles
        run: |
          set -e
          for po in languages/*.po; do
            echo "Checking $po"
            msgfmt --check --statistics -o /tmp/test.mo "$po"
          done

      # v3.110.159 — warn (don't fail) on untranslated msgstr entries.
      # `msgfmt --statistics` already prints a count; surface it via
      # GitHub annotations so the gap is visible on the PR page
      # without blocking the merge. Once the v3.110.x bulk-translate
      # ship lands and clears the backlog, this step flips from
      # `::warning::` to `exit 1` to enforce zero-untranslated as
      # a merge gate. Until then it's an informational nudge.
      - name: Warn on untranslated msgstr entries
        run: |
          set +e
          any_warn=0
          for po in languages/*.po; do
            # #1395 — entry-based count via msgattrib: the old
            # `^msgstr ""$` line-grep miscounted wrapped multi-line
            # translated msgstrs (whose first line is a bare
            # `msgstr ""`) as empty.
            empty=$(msgattrib --untranslated --no-fuzzy --no-obsolete \
              "$po" 2>/dev/null | grep -c '^msgid ' || true)
            if [ "$empty" -gt 0 ]; then
              echo "::warning file=$po::$empty untranslated msgstr entries in $po — fill in the translations to clear this warning."
              any_warn=1
            fi
          done
          if [ "$any_warn" -eq 0 ]; then
            echo "All msgstr entries translated — clean."
          fi

  compile:
    name: Auto-compile .po → .mo
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Regenerate .mo files
        run: |
          for po in languages/*.po; do
            mo="${po%.po}.mo"
            echo "Compiling $po → $mo"
            msgfmt -o "$mo" "$po"
          done
      - name: Commit regenerated .mo files if changed
        run: |
          if [ -n "$(git status --porcelain languages/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add languages/*.mo
            git commit -m "chore(i18n): regenerate .mo files from .po"
            git push
          else
            echo "No .mo changes; skipping commit."
          fi
