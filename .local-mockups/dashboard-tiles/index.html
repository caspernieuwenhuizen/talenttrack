<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentTrack — Dashboard tile display directions (5 mockups)</title>
<style>
/* =====================================================================
   Faithful to assets/css/tokens.css (the 2026 green/gold palette) +
   FrontendTileGrid / TileGridStandard. Five DISPLAY directions for the
   dashboard tiles, toggled by the state picker. Mobile-first: base CSS
   targets ~360px, min-width queries scale up (480 / 768 / 1024).
   ===================================================================== */
.tt-root{
  /* neutrals — from tokens.css */
  --tt-ink:#0e1a14; --tt-ink-soft:#6a6d66; --tt-muted:#6a6d66;
  --tt-paper:#ffffff; --tt-bg-soft:#f4f6f3; --tt-line:#e3e6e1; --tt-line-soft:#eef0ec;
  --tt-success:#2f9e5e; --tt-danger:#d8453b; --tt-warning:#e8902b; --tt-info:#2d6fb3;
  --tt-radius:8px; --tt-radius-lg:14px;
  --tt-shadow-md:0 8px 24px -8px rgba(0,0,0,.12);
  --tt-sp-1:4px; --tt-sp-2:8px; --tt-sp-3:12px; --tt-sp-4:16px; --tt-sp-5:20px; --tt-sp-6:24px;
  /* brand — emitted by BrandStyles in production; club-overridable */
  --tt-primary:#0b3d2e; --tt-primary-deep:#07261c; --tt-primary-soft:#145a44;
  --tt-secondary:#e8b624; --tt-secondary-deep:#b8890d;
  --tt-primary-rgb:11,61,46;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--tt-bg-soft,#f4f6f3); color:var(--tt-ink,#0e1a14);
  -webkit-font-smoothing:antialiased;
}

/* ---- harness chrome (not part of the design) ---- */
.harness{position:sticky; top:0; z-index:50; background:#0e1a14; color:#fff; padding:10px 14px;
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
.harness h1{font-size:14px; margin:0 12px 0 0; font-weight:700; letter-spacing:.01em;}
.harness button{font:inherit; font-size:13px; cursor:pointer; border:1px solid #2c4a3d; background:#143b2e;
  color:#dfe7e2; border-radius:999px; padding:7px 14px; min-height:40px;}
.harness button[aria-pressed="true"]{background:var(--tt-secondary,#e8b624); color:#1a1300; border-color:var(--tt-secondary,#e8b624); font-weight:700;}
.harness .vp{margin-left:auto; font-size:12px; color:#9fb3a9;}
.desc{max-width:1320px; margin:18px auto 0; padding:0 16px; color:var(--tt-muted); font-size:13px; line-height:1.5;}
.desc b{color:var(--tt-ink);}

/* ===================================================================== */
.tt-dashboard{max-width:1320px; margin:0 auto; padding:16px;}
.tt-ftile-greeting{font-size:1.4rem; font-weight:800; letter-spacing:-.01em; margin:6px 2px 4px; color:var(--tt-primary-deep);}
.tt-ftile-greeting span{color:var(--tt-muted); font-weight:600; font-size:.95rem; display:block; margin-top:2px;}
.tt-ftile-section-label{font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em;
  color:var(--tt-primary-deep); margin:22px 2px 10px; display:flex; align-items:center; gap:10px;}
.tt-ftile-section-label::after{content:""; flex:1; height:1px; background:var(--tt-line);}

/* shared icon chip — duotone glyph on a tinted square */
.tt-tile-chip{--c:var(--tt-primary,#0b3d2e); flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  border-radius:12px; background:color-mix(in srgb, var(--c) 13%, #fff); color:var(--c);}
.tt-tile-chip svg{width:58%; height:58%;}
.tt-badge{display:inline-flex; align-items:center; gap:4px; font-size:.72rem; font-weight:800; line-height:1;
  padding:3px 8px; border-radius:999px; background:var(--tt-secondary,#e8b624); color:#231900;}
.tt-badge--muted{background:var(--tt-line-soft); color:var(--tt-muted);}
.tt-badge--alert{background:var(--tt-danger); color:#fff;}

a.tt-ftile, a.tt-row, a.tt-kpi, a.tt-launch{ text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; }

/* =====================================================================
   1 · BENTO — varied tile sizes. Primary entities get hero tiles with a
   live count; secondary nav stays compact. Editorial, modern dashboard.
   ===================================================================== */
.v-bento .tt-bento{display:grid; grid-template-columns:1fr; gap:12px;}
@media(min-width:560px){ .v-bento .tt-bento{grid-template-columns:repeat(2,1fr);} }
@media(min-width:900px){ .v-bento .tt-bento{grid-template-columns:repeat(4,1fr); grid-auto-rows:minmax(120px,auto);} }
.v-bento .tt-ftile{display:flex; flex-direction:column; gap:10px; background:var(--tt-paper); border:1px solid var(--tt-line);
  border-radius:var(--tt-radius-lg); padding:16px; min-height:96px;
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;}
.v-bento .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md); border-color:color-mix(in srgb,var(--tt-primary) 30%,var(--tt-line));}
.v-bento .tt-ftile-head{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.v-bento .tt-tile-chip{width:44px; height:44px;}
.v-bento .tt-ftile-label{font-weight:700; font-size:1rem; margin:0;}
.v-bento .tt-ftile-desc{color:var(--tt-muted); font-size:.82rem; line-height:1.4; margin:0;}
.v-bento .tt-ftile-metric{font-size:2.1rem; font-weight:800; line-height:1; color:var(--tt-primary-deep); margin-top:auto;}
.v-bento .tt-ftile-metric small{font-size:.8rem; font-weight:600; color:var(--tt-muted); margin-left:6px;}
/* hero spans */
@media(min-width:900px){
  .v-bento .tt-ftile--hero{grid-column:span 2; grid-row:span 2; background:linear-gradient(150deg,var(--tt-primary) 0%,var(--tt-primary-deep) 100%); border-color:var(--tt-primary-deep); color:#fff;}
  .v-bento .tt-ftile--hero .tt-ftile-label,.v-bento .tt-ftile--hero .tt-ftile-metric{color:#fff;}
  .v-bento .tt-ftile--hero .tt-ftile-desc{color:#cfe0d7;}
  .v-bento .tt-ftile--hero .tt-tile-chip{background:rgba(255,255,255,.16); color:#fff; width:52px; height:52px;}
  .v-bento .tt-ftile--wide{grid-column:span 2;}
}

/* =====================================================================
   2 · ROWS — every tile is a full-width action row: chip · label+meta ·
   count · chevron. Densest, most scannable; reads like a native app list.
   ===================================================================== */
.v-rows .tt-rowgroup{background:var(--tt-paper); border:1px solid var(--tt-line); border-radius:var(--tt-radius-lg); overflow:hidden;}
.v-rows .tt-row{display:flex; align-items:center; gap:12px; padding:14px 14px; min-height:64px; border-bottom:1px solid var(--tt-line-soft);}
.v-rows .tt-row:last-child{border-bottom:0;}
.v-rows .tt-row:hover{background:var(--tt-bg-soft);}
.v-rows .tt-row:active{background:var(--tt-line-soft);}
.v-rows .tt-tile-chip{width:42px; height:42px;}
.v-rows .tt-row-body{flex:1; min-width:0;}
.v-rows .tt-row-label{font-weight:700; font-size:.98rem; margin:0;}
.v-rows .tt-row-desc{color:var(--tt-muted); font-size:.8rem; margin:2px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.v-rows .tt-row-count{font-weight:800; color:var(--tt-primary-deep); font-size:1.05rem;}
.v-rows .tt-row-chev{color:var(--tt-muted); flex-shrink:0;}
.v-rows .tt-row-chev svg{width:18px;height:18px;}

/* =====================================================================
   3 · KPI — metric-forward. Each tile LEADS with a number that answers
   "what needs me?". The dashboard becomes a development overview.
   ===================================================================== */
.v-kpi .tt-kpigrid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
@media(min-width:560px){ .v-kpi .tt-kpigrid{grid-template-columns:repeat(3,1fr);} }
@media(min-width:960px){ .v-kpi .tt-kpigrid{grid-template-columns:repeat(4,1fr);} }
.v-kpi .tt-kpi{display:flex; flex-direction:column; gap:6px; background:var(--tt-paper); border:1px solid var(--tt-line);
  border-left:4px solid var(--tt-primary); border-radius:var(--tt-radius); padding:16px; min-height:120px;
  transition:transform .15s ease, box-shadow .15s ease;}
.v-kpi .tt-kpi:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md);}
.v-kpi .tt-kpi--alert{border-left-color:var(--tt-secondary);}
.v-kpi .tt-kpi-top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.v-kpi .tt-tile-chip{width:34px; height:34px; border-radius:9px;}
.v-kpi .tt-kpi-num{font-size:2.3rem; font-weight:800; line-height:1; color:var(--tt-primary-deep);}
.v-kpi .tt-kpi-label{font-weight:700; font-size:.9rem; margin:0;}
.v-kpi .tt-kpi-sub{color:var(--tt-muted); font-size:.78rem; margin:0;}

/* =====================================================================
   4 · FOCUS — a "what needs me now" hero strip at the top (today's work +
   the My-work rail), then a compact icon grid for plain navigation below.
   Clear hierarchy: act first, browse second. Player-centric default.
   ===================================================================== */
.v-focus .tt-hero{display:grid; grid-template-columns:1fr; gap:12px;}
@media(min-width:1024px){ .v-focus .tt-hero{grid-template-columns:1.6fr 1fr;} }
.v-focus .tt-hero-card{background:linear-gradient(150deg,var(--tt-primary) 0%,var(--tt-primary-deep) 100%); color:#fff;
  border-radius:var(--tt-radius-lg); padding:18px;}
.v-focus .tt-hero-card h3{margin:0 0 10px; font-size:1rem; color:#fff;}
.v-focus .tt-hero-list{display:flex; flex-direction:column; gap:8px;}
.v-focus .tt-hero-item{display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.1); border-radius:10px; padding:11px 12px; min-height:48px; color:#fff;}
.v-focus .tt-hero-item .tt-badge{margin-left:auto;}
.v-focus .tt-hero-item .ic{width:22px;height:22px;flex-shrink:0;opacity:.9;}
.v-focus .tt-mywork{background:var(--tt-paper); border:1px solid var(--tt-line); border-radius:var(--tt-radius-lg); padding:16px;}
.v-focus .tt-mywork h3{margin:0 0 10px; font-size:.95rem; color:var(--tt-primary-deep);}
.v-focus .tt-mywork-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--tt-line-soft); min-height:44px;}
.v-focus .tt-mywork-row:last-child{border-bottom:0;}
.v-focus .tt-mywork-row .tt-tile-chip{width:32px;height:32px;border-radius:8px;}
.v-focus .tt-navgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:6px;}
@media(min-width:560px){ .v-focus .tt-navgrid{grid-template-columns:repeat(3,1fr);} }
@media(min-width:960px){ .v-focus .tt-navgrid{grid-template-columns:repeat(6,1fr);} }
.v-focus .tt-ftile{display:flex; align-items:center; gap:10px; background:var(--tt-paper); border:1px solid var(--tt-line);
  border-radius:var(--tt-radius); padding:12px; min-height:56px;}
.v-focus .tt-ftile:hover{border-color:color-mix(in srgb,var(--tt-primary) 30%,var(--tt-line)); background:var(--tt-bg-soft);}
.v-focus .tt-tile-chip{width:34px;height:34px;}
.v-focus .tt-ftile-label{font-weight:700; font-size:.85rem; margin:0; line-height:1.2;}

/* =====================================================================
   5 · LAUNCHER — app-home-screen density. Small square icon tiles, label
   under the glyph, count as a corner pip. Fastest pure navigation.
   ===================================================================== */
.v-launch .tt-launchgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
@media(min-width:480px){ .v-launch .tt-launchgrid{grid-template-columns:repeat(4,1fr);} }
@media(min-width:768px){ .v-launch .tt-launchgrid{grid-template-columns:repeat(6,1fr);} }
@media(min-width:1024px){ .v-launch .tt-launchgrid{grid-template-columns:repeat(8,1fr);} }
.v-launch .tt-launch{position:relative; display:flex; flex-direction:column; align-items:center; gap:8px;
  background:var(--tt-paper); border:1px solid var(--tt-line); border-radius:var(--tt-radius-lg); padding:14px 8px 12px; min-height:96px;
  transition:transform .15s ease, box-shadow .15s ease;}
.v-launch .tt-launch:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md);}
.v-launch .tt-launch:active{transform:scale(.97);}
.v-launch .tt-tile-chip{width:48px; height:48px; border-radius:14px;}
.v-launch .tt-launch-label{font-weight:700; font-size:.78rem; text-align:center; line-height:1.2; margin:0;}
.v-launch .tt-launch-pip{position:absolute; top:8px; right:8px;}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<div class="harness">
  <h1>Dashboard tiles — 5 display directions</h1>
  <button data-v="bento"  aria-pressed="true">1 · Bento</button>
  <button data-v="rows"   aria-pressed="false">2 · Action rows</button>
  <button data-v="kpi"    aria-pressed="false">3 · KPI-forward</button>
  <button data-v="focus"  aria-pressed="false">4 · Focus + nav</button>
  <button data-v="launch" aria-pressed="false">5 · Launcher</button>
  <span class="vp">resize the window to test 360 / 768 / 1024</span>
</div>

<p class="desc" id="blurb"></p>

<div class="tt-root">
  <div class="tt-dashboard">
    <div class="tt-ftile-greeting">Good afternoon, Casper<span id="sub-greet">Ajax Jeugdopleiding · 2025/26 season</span></div>
    <div id="stage"></div>
  </div>
</div>

<script>
/* ---- Realistic, player-centric tile data (counts = "what needs me") ---- */
const TILES = [
  { key:'players',  label:'Players',      desc:'Squad, profiles & development timelines', metric:84,  unit:'active', sub:'3 new this week',     icon:'user',     hero:true },
  { key:'evals',    label:'Evaluations',  desc:'Periodic ratings across 4 categories',    metric:12,  unit:'due',    sub:'12 assessments due',  icon:'star',     alert:true },
  { key:'goals',    label:'Goals & PDP',  desc:'Individual development goals',             metric:9,   unit:'open',   sub:'9 in progress',       icon:'target' },
  { key:'activities',label:'Activities',  desc:'Training, matches & attendance',           metric:2,   unit:'today',  sub:'2 sessions today',    icon:'calendar' },
  { key:'teams',    label:'Teams',        desc:'Age groups, rosters & staff',             metric:6,   unit:'groups', sub:'6 age groups',        icon:'shield' },
  { key:'trials',   label:'Trials',       desc:'Prospects in the recruitment funnel',     metric:4,   unit:'in trial',sub:'4 in trial',        icon:'spark',    alert:true },

const SETUP = [
  { key:'settings', label:'Settings',     desc:'Configuration & lookups', icon:'gear' },
  { key:'access',   label:'Access',       desc:'Roles & permissions',     icon:'lock' },
  { key:'backups',  label:'Backups',      desc:'Snapshots & migration',   icon:'archive' },
];
const MYWORK = [
  { label:'Rate 5 players — U17',     meta:'Evaluation window closes Fri', icon:'star',     badge:'5' },
  { label:'Approve 2 PDPs',           meta:'Submitted by coaches',         icon:'target',   badge:'2' },
  { label:'Confirm today’s attendance', meta:'U15 · 16:00 training',       icon:'calendar', badge:'!' },
];

const GLYPH = {
  user:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="96" r="64" opacity=".2"/><path d="M128 144a48 48 0 1 0-48-48 48 48 0 0 0 48 48Zm0-80a32 32 0 1 1-32 32 32 32 0 0 1 32-32Zm0 96c-44 0-80 24-80 56a8 8 0 0 0 16 0c0-22 28-40 64-40s64 18 64 40a8 8 0 0 0 16 0c0-32-36-56-80-56Z"/></svg>',
  users:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="92" cy="108" r="44" opacity=".2"/><path d="M164 80a44 44 0 1 1 0 88 4 4 0 0 1 0-8 36 36 0 1 0 0-72 4 4 0 0 1 0-8Zm60 112a8 8 0 0 1-11 3 67 67 0 0 0-34-11 8 8 0 0 1 0-16 51 51 0 0 1 26 8 8 8 0 0 1 19 16ZM92 152a44 44 0 1 1 44-44 44 44 0 0 1-44 44Zm0-72a28 28 0 1 0 28 28 28 28 0 0 0-28-28Zm68 124a8 8 0 0 1-14 0c0-18-24-32-54-32s-54 14-54 32a8 8 0 0 1-14 0c0-28 30-48 68-48s68 20 68 48Z"/></svg>',
  star:'<svg viewBox="0 0 256 256" fill="currentColor"><path d="m128 32 28 64 70 6-53 46 16 68-61-36-61 36 16-68-53-46 70-6Z" opacity=".2"/><path d="M234 98a8 8 0 0 0-7-6l-62-5-24-58a8 8 0 0 0-14 0l-24 58-62 5a8 8 0 0 0-5 14l47 41-14 61a8 8 0 0 0 12 9l54-32 54 32a8 8 0 0 0 12-9l-14-61 47-41a8 8 0 0 0 2-8Z"/></svg>',

  calendar:'<svg viewBox="0 0 256 256" fill="currentColor"><rect x="40" y="56" width="176" height="160" rx="8" opacity=".2"/><path d="M208 32h-24v-8a8 8 0 0 0-16 0v8H88v-8a8 8 0 0 0-16 0v8H48a16 16 0 0 0-16 16v160a16 16 0 0 0 16 16h160a16 16 0 0 0 16-16V48a16 16 0 0 0-16-16Zm0 176H48V96h160ZM48 80V48h24v8a8 8 0 0 0 16 0v-8h80v8a8 8 0 0 0 16 0v-8h24v32Z"/></svg>',
  target:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="128" r="96" opacity=".2"/><path d="M128 24a104 104 0 1 0 104 104A104 104 0 0 0 128 24Zm0 192a88 88 0 1 1 88-88 88 88 0 0 1-88 88Zm0-152a64 64 0 1 0 64 64 64 64 0 0 0-64-64Zm0 112a48 48 0 1 1 48-48 48 48 0 0 1-48 48Zm0-72a24 24 0 1 0 24 24 24 24 0 0 0-24-24Z"/></svg>',

  chart:'<svg viewBox="0 0 256 256" fill="currentColor"><path d="M224 208H32V48a8 8 0 0 1 16 0v160h176a8 8 0 0 1 0 16Z" opacity=".2"/><path d="M232 208a8 8 0 0 1-8 8H32a8 8 0 0 1-8-8V48a8 8 0 0 1 16 0v94l43-43a8 8 0 0 1 11 0l34 34 49-49a8 8 0 0 1 11 11l-55 55a8 8 0 0 1-11 0l-34-34-37 37h168a8 8 0 0 1 8 8Z"/></svg>',
  gear:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="128" r="40" opacity=".2"/><path d="M128 80a48 48 0 1 0 48 48 48 48 0 0 0-48-48Zm0 80a32 32 0 1 1 32-32 32 32 0 0 1-32 32Zm88-29-1-6 14-17a8 8 0 0 0 1-9 107 107 0 0 0-11-19 8 8 0 0 0-8-3l-22 4a78 78 0 0 0-5-3l-8-21a8 8 0 0 0-7-5 109 109 0 0 0-22 0 8 8 0 0 0-7 5l-8 21-5 3-22-4a8 8 0 0 0-8 3 107 107 0 0 0-11 19 8 8 0 0 0 1 9l14 17v12l-14 17a8 8 0 0 0-1 9 107 107 0 0 0 11 19 8 8 0 0 0 8 3l22-4 5 3 8 21a8 8 0 0 0 7 5 109 109 0 0 0 22 0 8 8 0 0 0 7-5l8-21 5-3 22 4a8 8 0 0 0 8-3 107 107 0 0 0 11-19 8 8 0 0 0-1-9l-14-17Z"/></svg>',
  lock:'<svg viewBox="0 0 256 256" fill="currentColor"><rect x="40" y="88" width="176" height="128" rx="8" opacity=".2"/><path d="M208 80h-24V56a56 56 0 0 0-112 0v24H48a16 16 0 0 0-16 16v112a16 16 0 0 0 16 16h160a16 16 0 0 0 16-16V96a16 16 0 0 0-16-16ZM88 56a40 40 0 0 1 80 0v24H88Zm120 152H48V96h160Zm-68-56a12 12 0 1 1-12-12 12 12 0 0 1 12 12Z"/></svg>',
  archive:'<svg viewBox="0 0 256 256" fill="currentColor"><rect x="32" y="64" width="192" height="40" opacity=".2"/><path d="M224 56H32a8 8 0 0 0-8 8v32a8 8 0 0 0 8 8h8v88a16 16 0 0 0 16 16h144a16 16 0 0 0 16-16v-88h8a8 8 0 0 0 8-8V64a8 8 0 0 0-8-8Zm-24 144H56v-88h144ZM216 96H40V72h176ZM104 136h48a8 8 0 0 1 0 16h-48a8 8 0 0 1 0-16Z"/></svg>',
};
const CHEV='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M96 48l80 80-80 80" stroke="currentColor" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

const chip = (t,extra='') => `<span class="tt-tile-chip" ${extra}>${GLYPH[t.icon]||''}</span>`;
const sectionLabel = (txt) => `<div class="tt-ftile-section-label">${txt}</div>`;

/* ---- 1 · BENTO ---- */
function bento(){
  const cell = t => {
    const cls = t.hero ? 'tt-ftile tt-ftile--hero' : (t.key==='reports'||t.key==='people' ? 'tt-ftile tt-ftile--wide' : 'tt-ftile');
    const metric = t.metric!=='' ? `<div class="tt-ftile-metric">${t.metric}<small>${t.unit}</small></div>` : '';
    const badge = t.alert ? `<span class="tt-badge">Needs you</span>` : '';
    return `<a class="${cls}" href="#"><div class="tt-ftile-head">${chip(t)}${badge}</div>
      <div><div class="tt-ftile-label">${t.label}</div><p class="tt-ftile-desc">${t.desc}</p></div>${metric}</a>`;
  };
  return sectionLabel("Today's work")+`<div class="tt-bento">${TILES.map(cell).join('')}</div>`
    + sectionLabel('Setup & administration')+`<div class="tt-bento">${SETUP.map(cell).join('')}</div>`;
}

/* ---- 2 · ACTION ROWS ---- */
function rows(){
  const row = t => `<a class="tt-row" href="#">${chip(t)}
    <div class="tt-row-body"><p class="tt-row-label">${t.label}</p><p class="tt-row-desc">${t.sub||t.desc}</p></div>
    ${t.metric!=='' ? `<span class="tt-row-count">${t.metric}</span>`:''}
    <span class="tt-row-chev">${CHEV}</span></a>`;
  return sectionLabel("Today's work")+`<div class="tt-rowgroup">${TILES.map(row).join('')}</div>`
    + sectionLabel('Setup & administration')+`<div class="tt-rowgroup">${SETUP.map(row).join('')}</div>`;
}

/* ---- 3 · KPI-FORWARD ---- */
function kpi(){
  const card = t => {
    const num = t.metric!=='' ? t.metric : '—';
    return `<a class="tt-kpi ${t.alert?'tt-kpi--alert':''}" href="#">
      <div class="tt-kpi-top">${chip(t)}${t.alert?'<span class="tt-badge">!</span>':''}</div>
      <div class="tt-kpi-num">${num}</div>
      <p class="tt-kpi-label">${t.label}</p><p class="tt-kpi-sub">${t.sub||t.desc}</p></a>`;
  };
  return sectionLabel("Today's work")+`<div class="tt-kpigrid">${TILES.map(card).join('')}</div>`
    + sectionLabel('Setup & administration')+`<div class="tt-kpigrid">${SETUP.map(card).join('')}</div>`;
}

/* ---- 4 · FOCUS + NAV ---- */
function focus(){
  const hero = `<div class="tt-hero">
    <div class="tt-hero-card"><h3>What needs you today</h3><div class="tt-hero-list">
      ${MYWORK.map(m=>`<div class="tt-hero-item"><span class="ic">${GLYPH[m.icon]}</span><span>${m.label}<br><small style="opacity:.8">${m.meta}</small></span><span class="tt-badge ${m.badge==='!'?'tt-badge--alert':''}">${m.badge}</span></div>`).join('')}
    </div></div>
    <div class="tt-mywork"><h3>My work</h3>
      ${MYWORK.map(m=>`<div class="tt-mywork-row">${chip({icon:m.icon})}<div><strong style="font-size:.85rem">${m.label}</strong><div style="color:var(--tt-muted);font-size:.75rem">${m.meta}</div></div></div>`).join('')}
    </div></div>`;
  const nav = t => `<a class="tt-ftile" href="#">${chip(t)}<p class="tt-ftile-label">${t.label}</p></a>`;
  return hero
    + sectionLabel('Browse')+`<div class="tt-navgrid">${TILES.map(nav).join('')}</div>`
    + sectionLabel('Setup & administration')+`<div class="tt-navgrid">${SETUP.map(nav).join('')}</div>`;
}

/* ---- 5 · LAUNCHER ---- */
function launch(){
  const tile = t => `<a class="tt-launch" href="#">
    ${t.alert?`<span class="tt-launch-pip tt-badge tt-badge--alert">${t.metric||'!'}</span>`:(t.metric!==''&&t.metric!==undefined?`<span class="tt-launch-pip tt-badge tt-badge--muted">${t.metric}</span>`:'')}
    ${chip(t)}<p class="tt-launch-label">${t.label}</p></a>`;
  return sectionLabel("Today's work")+`<div class="tt-launchgrid">${TILES.map(tile).join('')}</div>`
    + sectionLabel('Setup & administration')+`<div class="tt-launchgrid">${SETUP.map(tile).join('')}</div>`;
}

const VIEWS = { bento, rows, kpi, focus, launch };
const BLURB = {
  bento:'<b>Bento.</b> Primary entities get hero tiles with a live count; secondary nav stays compact. Editorial and modern — best when a few entities dominate daily use. Heaviest to build (variable spans).',
  rows:'<b>Action rows.</b> Every tile is a full-width row: icon · label · count · chevron. Densest and most scannable, reads like a native app list — strongest on a phone, lightest to build (closest to today’s markup).',
  kpi:'<b>KPI-forward.</b> Each tile leads with the number that answers “what needs me?”. Turns the dashboard into a development overview. Great for heads of academy; risk: counts must always be live or the lead number feels stale.',
  focus:'<b>Focus + nav.</b> A “what needs you today” hero + My-work rail on top, then a compact icon grid for plain navigation. Clearest act-first/browse-second hierarchy — most player-centric, closest to the current section split.',
  launch:'<b>Launcher.</b> App-home-screen density: small square icon tiles, count as a corner pip. Fastest pure navigation, maximum tiles above the fold; weakest at conveying status (counts are tiny).',
};

let current='bento';
function render(v){
  current=v;
  document.getElementById('stage').innerHTML = VIEWS[v]();
  document.getElementById('stage').className = 'v-'+v;
  document.getElementById('blurb').innerHTML = BLURB[v];
  document.querySelectorAll('.harness button').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.v===v)));
}
document.querySelectorAll('.harness button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.v)));
render('bento');
</script>
</body>
</html>
