<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentTrack — Dashboard tiles: same layout, recolored</title>
<style>
/* =====================================================================
   SAME tile layout as today (FrontendTileGrid .tt-ftile: icon chip centred
   beside stacked label + description). Only the COLOR SCHEME changes between
   variants — full border / green fill matching the top bar / gold accent.
   Tokens faithful to assets/css/tokens.css (2026 green/gold).
   ===================================================================== */
.tt-root{
  --tt-ink:#0e1a14; --tt-muted:#6a6d66;
  --tt-paper:#ffffff; --tt-bg-soft:#f4f6f3; --tt-line:#e3e6e1; --tt-line-soft:#eef0ec;
  --tt-radius:8px; --tt-radius-lg:14px; --tt-shadow-md:0 8px 24px -8px rgba(0,0,0,.12);
  --tt-primary:#0b3d2e; --tt-primary-deep:#07261c; --tt-primary-soft:#145a44;
  --tt-secondary:#e8b624;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--tt-bg-soft); color:var(--tt-ink); -webkit-font-smoothing:antialiased;}

/* harness */
.harness{position:sticky; top:0; z-index:50; background:#0e1a14; color:#fff; padding:10px 14px;
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
.harness h1{font-size:14px; margin:0 12px 0 0; font-weight:700;}
.harness button{font:inherit; font-size:13px; cursor:pointer; border:1px solid #2c4a3d; background:#143b2e;
  color:#dfe7e2; border-radius:999px; padding:7px 14px; min-height:40px;}
.harness button[aria-pressed="true"]{background:var(--tt-secondary); color:#1a1300; border-color:var(--tt-secondary); font-weight:700;}
.blurb{max-width:980px; margin:16px auto 0; padding:0 16px; color:var(--tt-muted); font-size:13px; line-height:1.5;}
.blurb b{color:var(--tt-ink);}

/* the real top bar, shown so the match is judgeable */
.tt-dash-header{max-width:980px; margin:14px auto 0; background:var(--tt-primary); border-bottom:3px solid var(--tt-secondary);
  color:#fff; display:flex; align-items:center; justify-content:space-between; padding:.6rem .9rem; border-radius:8px 8px 0 0; box-shadow:var(--tt-shadow-md);}
.tt-dash-title{margin:0; font-size:1rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.tt-dash-chip{background:rgba(255,255,255,.16); color:#fff; border-radius:999px; padding:4px 12px; font-size:.78rem; font-weight:700;}

.tt-dashboard{max-width:980px; margin:0 auto; padding:16px;}
.tt-ftile-section-label{font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em;
  color:var(--tt-primary-deep); margin:18px 2px 10px; display:flex; align-items:center; gap:10px;}
.tt-ftile-section-label::after{content:""; flex:1; height:1px; background:var(--tt-line);}

/* ---- the grid + tile, IDENTICAL to today's "comfortable" layout ---- */
.tt-ftile-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px;}
@media(max-width:560px){ .tt-ftile-grid{grid-template-columns:1fr;} }
.tt-ftile{display:flex; align-items:center; gap:11px; text-decoration:none; color:var(--tt-ink);
  background:var(--tt-paper); border:1px solid var(--tt-line); border-radius:var(--tt-radius);
  padding:14px; min-height:76px; transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;}
.tt-ftile-body{min-width:0; flex:1;}
.tt-ftile-label{font-weight:600; font-size:14px; line-height:1.25; margin:0 0 2px;}
.tt-ftile-desc{color:var(--tt-muted); font-size:12px; line-height:1.35; margin:0;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.tt-tile-chip{--c:var(--tt-primary); width:52px; height:52px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  border-radius:12px; background:color-mix(in srgb,var(--c) 13%, #fff); color:var(--c);}
.tt-tile-chip svg{width:58%; height:58%;}

/* =====================================================================
   VARIANTS — only colors/border/fill change. Layout is untouched.
   ===================================================================== */

/* 0 · Baseline (today): white fill, hairline grey border, green-tint hover */
.v-base .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md);
  border-color:color-mix(in srgb,var(--tt-primary) 30%,var(--tt-line)); background:color-mix(in srgb,var(--tt-primary) 3%,#fff);}

/* A · Full green border — white fill, full 1.5px --tt-primary border */
.v-border .tt-ftile{border:1.5px solid var(--tt-primary);}
.v-border .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md); background:color-mix(in srgb,var(--tt-primary) 5%,#fff);}

/* B · Gold-topped border — echoes the bar's gold underline (green border + 3px gold top) */
.v-gold .tt-ftile{border:1.5px solid var(--tt-primary); border-top:3px solid var(--tt-secondary);}
.v-gold .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md); background:color-mix(in srgb,var(--tt-primary) 5%,#fff);}

/* C · Soft green fill — light green tint matching the bar's hue, green border, dark text */
.v-soft .tt-ftile{background:color-mix(in srgb,var(--tt-primary) 7%,#fff); border:1px solid color-mix(in srgb,var(--tt-primary) 25%,var(--tt-line));}
.v-soft .tt-tile-chip{background:#fff;}
.v-soft .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md); background:color-mix(in srgb,var(--tt-primary) 12%,#fff);}

/* D · Solid green fill — tiles match the top bar (dark green + gold accent, white text) */
.v-solid .tt-ftile{background:var(--tt-primary); border:1px solid var(--tt-primary-deep); border-bottom:3px solid var(--tt-secondary); color:#fff;}
.v-solid .tt-ftile-label{color:#fff;}
.v-solid .tt-ftile-desc{color:#cfe0d7;}
.v-solid .tt-tile-chip{background:rgba(255,255,255,.16); color:#fff;}
.v-solid .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md); background:var(--tt-primary-deep);}
.v-solid .tt-ftile-section-label{color:var(--tt-primary-deep);}

/* E · Left-accent bar — white fill, thick green left edge + gold on hover (subtle, current-ish) */
.v-accent .tt-ftile{border:1px solid var(--tt-line); border-left:4px solid var(--tt-primary);}
.v-accent .tt-ftile:hover{transform:translateY(-2px); box-shadow:var(--tt-shadow-md); border-left-color:var(--tt-secondary); background:color-mix(in srgb,var(--tt-primary) 4%,#fff);}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<div class="harness">
  <h1>Same tiles — recolored</h1>
  <button data-v="base"   aria-pressed="true">0 · Baseline (today)</button>
  <button data-v="border" aria-pressed="false">A · Full green border</button>
  <button data-v="gold"   aria-pressed="false">B · Gold-topped</button>
  <button data-v="soft"   aria-pressed="false">C · Soft green fill</button>
  <button data-v="solid"  aria-pressed="false">D · Solid green (= top bar)</button>
  <button data-v="accent" aria-pressed="false">E · Left accent</button>
</div>

<p class="blurb" id="blurb"></p>

<div class="tt-root">
  <div class="tt-dash-header"><p class="tt-dash-title">TalentTrack</p><span class="tt-dash-chip">Head of Academy</span></div>
  <div class="tt-dashboard">
    <div id="stage"></div>
  </div>
</div>

<script>
const TILES = [
  { label:'Players',     desc:'Squad list, profiles, development timelines and status.', icon:'user' },
  { label:'Evaluations', desc:'Periodic ratings across technical, tactical, physical and mental.', icon:'star' },
  { label:'Teams',       desc:'Age groups, rosters and staff assignments.', icon:'shield' },
  { label:'Activities',  desc:'Training sessions, matches and attendance.', icon:'calendar' },
  { label:'Goals & PDP', desc:'Individual development goals and progress notes.', icon:'target' },
  { label:'Reports',     desc:'Standard and scheduled reports across the academy.', icon:'chart' },
];
const SETUP = [
  { label:'Settings', desc:'Configuration and editable lookups.', icon:'gear' },
  { label:'Access',   desc:'Roles, permissions and functional roles.', icon:'lock' },
  { label:'Backups',  desc:'Snapshots, restore and data migration.', icon:'archive' },
];
const GLYPH = {
  user:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="96" r="64" opacity=".2"/><path d="M128 144a48 48 0 1 0-48-48 48 48 0 0 0 48 48Zm0-80a32 32 0 1 1-32 32 32 32 0 0 1 32-32Zm0 96c-44 0-80 24-80 56a8 8 0 0 0 16 0c0-22 28-40 64-40s64 18 64 40a8 8 0 0 0 16 0c0-32-36-56-80-56Z"/></svg>',
  star:'<svg viewBox="0 0 256 256" fill="currentColor"><path d="m128 32 28 64 70 6-53 46 16 68-61-36-61 36 16-68-53-46 70-6Z" opacity=".2"/><path d="M234 98a8 8 0 0 0-7-6l-62-5-24-58a8 8 0 0 0-14 0l-24 58-62 5a8 8 0 0 0-5 14l47 41-14 61a8 8 0 0 0 12 9l54-32 54 32a8 8 0 0 0 12-9l-14-61 47-41a8 8 0 0 0 2-8Z"/></svg>',
  shield:'<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216 56v56c0 86-80 120-86 122-6-2-86-36-86-122V56a8 8 0 0 1 8-8h156a8 8 0 0 1 8 8Z" opacity=".2"/><path d="M208 40H48a16 16 0 0 0-16 16v56c0 92 86 128 94 131a8 8 0 0 0 6 0c8-3 94-39 94-131V56a16 16 0 0 0-16-16Zm0 72c0 78-69 110-80 114-11-4-80-36-80-114V56h160Z"/></svg>',
  calendar:'<svg viewBox="0 0 256 256" fill="currentColor"><rect x="40" y="56" width="176" height="160" rx="8" opacity=".2"/><path d="M208 32h-24v-8a8 8 0 0 0-16 0v8H88v-8a8 8 0 0 0-16 0v8H48a16 16 0 0 0-16 16v160a16 16 0 0 0 16 16h160a16 16 0 0 0 16-16V48a16 16 0 0 0-16-16Zm0 176H48V96h160ZM48 80V48h24v8a8 8 0 0 0 16 0v-8h80v8a8 8 0 0 0 16 0v-8h24v32Z"/></svg>',
  target:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="128" r="96" opacity=".2"/><path d="M128 24a104 104 0 1 0 104 104A104 104 0 0 0 128 24Zm0 192a88 88 0 1 1 88-88 88 88 0 0 1-88 88Zm0-152a64 64 0 1 0 64 64 64 64 0 0 0-64-64Zm0 112a48 48 0 1 1 48-48 48 48 0 0 1-48 48Zm0-72a24 24 0 1 0 24 24 24 24 0 0 0-24-24Z"/></svg>',
  chart:'<svg viewBox="0 0 256 256" fill="currentColor"><path d="M224 208H32V48a8 8 0 0 1 16 0v160h176a8 8 0 0 1 0 16Z" opacity=".2"/><path d="M232 208a8 8 0 0 1-8 8H32a8 8 0 0 1-8-8V48a8 8 0 0 1 16 0v94l43-43a8 8 0 0 1 11 0l34 34 49-49a8 8 0 0 1 11 11l-55 55a8 8 0 0 1-11 0l-34-34-37 37h168a8 8 0 0 1 8 8Z"/></svg>',
  gear:'<svg viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="128" r="40" opacity=".2"/><path d="M128 80a48 48 0 1 0 48 48 48 48 0 0 0-48-48Zm0 80a32 32 0 1 1 32-32 32 32 0 0 1-32 32Zm88-29-1-6 14-17a8 8 0 0 0 1-9 107 107 0 0 0-11-19 8 8 0 0 0-8-3l-22 4a78 78 0 0 0-5-3l-8-21a8 8 0 0 0-7-5 109 109 0 0 0-22 0 8 8 0 0 0-7 5l-8 21-5 3-22-4a8 8 0 0 0-8 3 107 107 0 0 0-11 19 8 8 0 0 0 1 9l14 17v12l-14 17a8 8 0 0 0-1 9 107 107 0 0 0 11 19 8 8 0 0 0 8 3l22-4 5 3 8 21a8 8 0 0 0 7 5 109 109 0 0 0 22 0 8 8 0 0 0 7-5l8-21 5-3 22 4a8 8 0 0 0 8-3 107 107 0 0 0 11-19 8 8 0 0 0-1-9l-14-17Z"/></svg>',
  lock:'<svg viewBox="0 0 256 256" fill="currentColor"><rect x="40" y="88" width="176" height="128" rx="8" opacity=".2"/><path d="M208 80h-24V56a56 56 0 0 0-112 0v24H48a16 16 0 0 0-16 16v112a16 16 0 0 0 16 16h160a16 16 0 0 0 16-16V96a16 16 0 0 0-16-16ZM88 56a40 40 0 0 1 80 0v24H88Zm120 152H48V96h160Zm-68-56a12 12 0 1 1-12-12 12 12 0 0 1 12 12Z"/></svg>',
  archive:'<svg viewBox="0 0 256 256" fill="currentColor"><rect x="32" y="64" width="192" height="40" opacity=".2"/><path d="M224 56H32a8 8 0 0 0-8 8v32a8 8 0 0 0 8 8h8v88a16 16 0 0 0 16 16h144a16 16 0 0 0 16-16v-88h8a8 8 0 0 0 8-8V64a8 8 0 0 0-8-8Zm-24 144H56v-88h144ZM216 96H40V72h176ZM104 136h48a8 8 0 0 1 0 16h-48a8 8 0 0 1 0-16Z"/></svg>',
};
const tile = t => `<a class="tt-ftile" href="#">
  <span class="tt-tile-chip">${GLYPH[t.icon]||''}</span>
  <div class="tt-ftile-body"><div class="tt-ftile-label">${t.label}</div><p class="tt-ftile-desc">${t.desc}</p></div></a>`;

const stageHTML = () =>
  `<div class="tt-ftile-section-label">Today's work</div><div class="tt-ftile-grid">${TILES.map(tile).join('')}</div>`
+ `<div class="tt-ftile-section-label">Setup &amp; administration</div><div class="tt-ftile-grid">${SETUP.map(tile).join('')}</div>`;

const BLURB = {
  base:'<b>0 · Baseline.</b> Today’s look — white fill, hairline grey border, faint green tint on hover. Shown for diffing.',
  border:'<b>A · Full green border.</b> White fill kept, but every tile gets a full 1.5px brand-green outline. Cleanest way to tie the grid to the brand without changing readability.',
  gold:'<b>B · Gold-topped.</b> Full green border plus a 3px gold top edge — directly mirrors the top bar’s gold underline. Strong brand echo, still light on the eyes.',
  soft:'<b>C · Soft green fill.</b> Tiles filled with a light tint of the bar’s green + a green border; chip flips to white. Warmer, more “designed”, text stays dark and legible.',
  solid:'<b>D · Solid green (= top bar).</b> Tiles fully match the top bar: dark green fill, gold bottom accent, white text, translucent chip. Boldest match; watch contrast on the muted description (#cfe0d7 on green ≈ 4.6:1, passes).',
  accent:'<b>E · Left accent.</b> White fill, thick green left edge that turns gold on hover. Subtle, closest to today while still clearly branded.',
};

function render(v){
  document.getElementById('stage').innerHTML = stageHTML();
  document.getElementById('stage').className = 'v-'+v;
  document.getElementById('blurb').innerHTML = BLURB[v];
  document.querySelectorAll('.harness button').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.v===v)));
}
document.querySelectorAll('.harness button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.v)));
render('base');
</script>
</body>
</html>
